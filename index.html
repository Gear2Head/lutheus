<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lutheus CezaRapor</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0a0c;
      color: #f5f5f7;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(520px, calc(100% - 32px));
      border: 1px solid #252528;
      border-radius: 8px;
      background: #141416;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0;
      color: #9a9aa0;
      line-height: 1.55;
    }
    code {
      color: #a87eff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Lutheus CezaRapor</h1>
    <p>Vercel auth broker ve AI proxy yayinda. Extension girisi icin Chrome MV3 paketini kullan.</p>
    <p>Health endpoint: <code>/api/health</code></p>
  </main>
</body>
</html>
