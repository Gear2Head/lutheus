<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lutheus CezaRapor | Global Dashboard</title>
  <link rel="icon" type="image/png" href="favicon_shield.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global-dashboard.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo"><i class="fa-solid fa-shield-halved"></i> Lutheus <span>CezaRapor</span></div>
      <div class="user-zone">
        <button class="btn-primary" id="loginDiscordBtn" style="background:#5865F2;"><i class="fa-brands fa-discord"></i> Discord ile Giriş</button>
        <button class="btn-primary" id="loginBtn"><i class="fa-brands fa-google"></i> Google</button>
      </div>
    </header>

    <div id="dashboardContent" class="hidden">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Toplam Ceza</div>
          <div class="stat-value" id="global-total">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Aktif Yetkili</div>
          <div class="stat-value" id="global-mods">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Haftalık Verim</div>
          <div class="stat-value" id="global-efficiency">0%</div>
        </div>
      </div>

      <div class="panel" style="margin-bottom:24px;">
        <div class="panel-header">
          <div class="panel-title"><i class="fa-solid fa-ranking-star"></i> Haftalık Liderlik Tablosu</div>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>Yetkili</th>
              <th>İşlem</th>
              <th>Doğruluk</th>
              <th>Skor</th>
            </tr>
          </thead>
          <tbody id="leaderboard"></tbody>
        </table>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-title"><i class="fa-solid fa-list-ul"></i> Son İşlemler</div>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Yetkili</th>
              <th>Kullanıcı</th>
              <th>Sebep</th>
              <th>Tarih</th>
            </tr>
          </thead>
          <tbody id="recentCases"></tbody>
        </table>
      </div>
    </div>

    <div id="loginState" style="text-align:center; padding:100px 0;">
      <h2 style="font-size:32px; margin-bottom:16px;">Veri Odaklı Moderasyon</h2>
      <p style="color:var(--text-dim); max-width:500px; margin:0 auto 32px;">Lutheus CezaRapor global dashboard'una erişmek için Google yetkilendirmesi gereklidir.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, OAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWM0Jl3Fyyok9BIvLCQ1PjKzdl9074ZSs",
      authDomain: "lutheus-project.firebaseapp.com",
      projectId: "lutheus-project",
      storageBucket: "lutheus-project.firebasestorage.app",
      messagingSenderId: "437884095032",
      appId: "1:437884095032:web:4a03ae2ff47d659dedf4cd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    const discordProvider = new OAuthProvider('oidc.discord');

    async function loadStats() {
      const oneWeekAgo = new Date();
      oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);

      const q = query(collection(db, "punishments"), orderBy("scrapedAt", "desc"), limit(200));
      const snap = await getDocs(q);
      const allCases = snap.docs.map(doc => doc.data());
      const cases = allCases.filter(c => (c.scrapedAt || 0) >= oneWeekAgo.getTime());
      
      const modMap = {};
      cases.forEach(c => {
        const name = c.authorName || 'Bilinmiyor';
        if (!modMap[name]) modMap[name] = { name, count: 0, valid: 0 };
        modMap[name].count++;
        if (c.validationStatus === 'valid') modMap[name].valid++;
      });

      const mods = Object.values(modMap).sort((a,b) => b.count - a.count);
      
      document.getElementById('global-total').textContent = cases.length;
      document.getElementById('global-mods').textContent = mods.length;
      
      const totalValid = cases.filter(c => c.validationStatus === 'valid').length;
      document.getElementById('global-efficiency').textContent = cases.length ? Math.round((totalValid/cases.length)*100) + '%' : '0%';

      document.getElementById('leaderboard').innerHTML = mods.map(m => `
        <tr class="data-row">
          <td style="font-weight:600;">${m.name}</td>
          <td style="font-family:'JetBrains Mono'">${m.count}</td>
          <td>
            <div style="display:flex; align-items:center; gap:10px;">
              <div class="progress-bar"><div class="progress-fill" style="width:${Math.round((m.valid/m.count)*100)}%"></div></div>
              <span>${Math.round((m.valid/m.count)*100)}%</span>
            </div>
          </td>
          <td style="font-weight:700; color:var(--accent);">${(m.count * (m.valid/m.count)).toFixed(1)}</td>
        </tr>
      `).join('');

      document.getElementById('recentCases').innerHTML = allCases.slice(0, 20).map(c => `
        <tr class="data-row">
          <td style="font-family:var(--font-mono); font-size:12px; color:var(--accent);">#${c.id || '-'}</td>
          <td>${c.authorName || 'Bilinmiyor'}</td>
          <td>${c.user || 'Bilinmiyor'}</td>
          <td style="font-size:13px; color:var(--text-dim); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.reason || '-'}</td>
          <td style="font-size:12px;">${new Date(c.scrapedAt || 0).toLocaleDateString('tr-TR')}</td>
        </tr>
      `).join('');
    }

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, googleProvider);
    document.getElementById('loginDiscordBtn').onclick = () => signInWithPopup(auth, discordProvider);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginBtn').classList.add('hidden');
        document.getElementById('loginDiscordBtn').innerHTML = `<i class="fa-solid fa-user-check"></i> ${user.displayName.split(' ')[0]}`;
        document.getElementById('loginState').classList.add('hidden');
        document.getElementById('dashboardContent').classList.remove('hidden');
        loadStats();
      }
    });
  </script>
</body>
</html>
