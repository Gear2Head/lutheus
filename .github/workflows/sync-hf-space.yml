name: Sync Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.LUTHEUS_SYNC }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is missing. Add a Hugging Face write token as GitHub Actions secret HF_TOKEN."
            exit 1
          fi
          git config user.name "Lutheus Deploy"
          git config user.email "deploy@lutheus.internal"
          git remote add hf-space "https://Gear2Head:${HF_TOKEN}@huggingface.co/spaces/Gear2Head/Lutheus_Bot"
          git push hf-space main --force
